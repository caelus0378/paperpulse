name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 47.83.202.19
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /app

            # 备份 .env 和数据
            cp .env /tmp/paperpulse_env_backup 2>/dev/null || true

            # 拉取最新代码
            git pull origin main

            # 恢复 .env
            cp /tmp/paperpulse_env_backup /app/.env 2>/dev/null || true

            # 重建并启动
            docker compose down
            docker compose up -d --build

            echo "✅ Deploy OK — $(date)"
